quarkus.http.port=8081
quarkus.rest.path=/api
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.profile=dev

# Disable Liquibase (schema management handled by Hibernate)
quarkus.liquibase.enabled=false

# Hibernate schema management
# validate: check that schema matches entities (tables created by init-schemas.sql)
quarkus.hibernate-orm.schema-management.strategy=validate

# Development: Minimal connection pool
%dev.quarkus.datasource.jdbc.initial-size=1
%dev.quarkus.datasource.jdbc.min-size=1
%dev.quarkus.datasource.jdbc.max-size=5

# Production: Standard connection pool
%prod.quarkus.datasource.jdbc.initial-size=5
%prod.quarkus.datasource.jdbc.min-size=3
%prod.quarkus.datasource.jdbc.max-size=20

# Allow JSONB columns without custom FormatMapper
quarkus.hibernate-orm.mapping.format.global=ignore

# Database Configuration (workbench schema)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/workbench}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:workbench}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:workbench}

# TI-2: REST Client for deploying templates to blocpress-render
quarkus.rest-client."render-import".url=${RENDER_URL:http://localhost:8080}/api

# HTTP Logging for debugging REST client communication
quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG
quarkus.log.category."org.eclipse.microprofile.rest.client".level=DEBUG
quarkus.log.category."io.github.flaechsig.blocpress.workbench".level=DEBUG
