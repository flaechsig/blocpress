quarkus.swagger-ui.always-include=true

# --- CORS ---
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*

# --- JWT Authentication (TI-4) ---
# DISABLED FOR DEV - remove this for production
# Defaults use the built-in dev key. Override via environment variables:
#   MP_JWT_VERIFY_PUBLICKEY=<PEM string>
#   MP_JWT_VERIFY_ISSUER=<issuer URL>
# mp.jwt.verify.
# mp.jwt.verify.issuer=https://blocpress.dev
# smallrye.jwt.path.groups=groups

# --- Database Configuration (TI-2: production schema) ---
# With TI-2, templates are imported into the local production schema
# Uses same PostgreSQL instance as workbench but with separate "production" schema
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/production}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:workbench}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:workbench}
quarkus.hibernate-orm.schema-management.strategy=validate

# --- Template Cache Configuration (UC-10 + TI-2) ---
# Caches template content from the local production schema
quarkus.cache.enabled=true
quarkus.cache.type=caffeine
quarkus.cache.caffeine."templates".maximum-size=100
quarkus.cache.caffeine."templates".expire-after-write=10M

# --- Security Configuration ---
# Internal endpoints (no authentication required)
quarkus.http.auth.permission.internal.paths=/api/render/templates/import
quarkus.http.auth.permission.internal.policy=permit

# HTTP Logging for debugging
quarkus.log.category."org.jboss.resteasy.reactive".level=DEBUG
quarkus.log.category."io.github.flaechsig.blocpress.render".level=DEBUG
